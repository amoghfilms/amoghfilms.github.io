<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* HERO SECTION */
.hero {
  height: 90vh;
  background: linear-gradient(to bottom, #000, #222);
  display: flex;
  align-items: flex-end;
  padding: 40px;
}

.hero-text {
  max-width: 500px;
}

.hero h1 {
  font-size: 3em;
  margin: 0;
}

.hero p {
  color: #ccc;
  margin-top: 10px;
}

/* ROW STYLE */
.section {
  padding: 20px;
}

.section h2 {
  margin-left: 10px;
}

/* NETFLIX ROW */
.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.row::-webkit-scrollbar {
  display: none;
}

/* POSTER */
.card {
  min-width: 200px;
  height: 300px;
  position: relative;
  cursor: pointer;
  transition: transform 0.3s;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
}

.card:hover {
  transform: scale(1.1);
  z-index: 2;
}

/* HOVER OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  background: rgba(0,0,0,0.8);
  width: 100%;
  padding: 10px;
  opacity: 0;
  transition: 0.3s;
}

.card:hover .overlay {
  opacity: 1;
}

.overlay h3 {
  margin: 0;
  font-size: 16px;
}

.overlay p {
  font-size: 12px;
  color: #bbb;
}
</style>
</head>

<body>

  <div class="hero-text">

</div>

</div>

</body>
</html>
